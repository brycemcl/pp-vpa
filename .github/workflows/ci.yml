name: ci
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: vet
        run: go vet ./...
      - name: unit tests
        run: go test -race ./...
      - name: build
        run: go build ./...
      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
