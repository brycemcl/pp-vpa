{{- if .Values.apf.enabled }}
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: PriorityLevelConfiguration
metadata:
  name: pp-vpa-control-plane
spec:
  type: Limited
  limited:
    nominalConcurrencyShares: {{ .Values.apf.controlPlane.assuredConcurrencyShares }}
    limitResponse:
      type: Queue
      queuing:
        queueLengthLimit: 100
        queues: 32
        handSize: 6
---
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: PriorityLevelConfiguration
metadata:
  name: pp-vpa-node-agents
spec:
  type: Limited
  limited:
    nominalConcurrencyShares: {{ .Values.apf.nodeAgents.assuredConcurrencyShares }}
    limitResponse:
      type: Queue
      queuing:
        queueLengthLimit: 200
        queues: 128
        handSize: 8
---
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: FlowSchema
metadata:
  name: pp-vpa-control-plane
spec:
  matchingPrecedence: 800
  priorityLevelConfiguration:
    name: pp-vpa-control-plane
  distinguisherMethod:
    type: ByUser
  rules:
    - subjects:
        - kind: ServiceAccount
          serviceAccount:
            namespace: {{ .Values.namespace }}
            name: pp-vpa-manager
      resourceRules:
        # Namespaced CRDs — match in every namespace.
        - verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          apiGroups: ["autoscaling.brycemclachlan.me"]
          resources:
            - perpodverticalpodautoscalers
            - perpodverticalpodautoscalers/status
            - perpodverticalpodautoscalers/scale
            - podresourcerecommendations
            - podresourcerecommendations/status
            - perpodverticalpodautoscalercheckpoints
            - perpodverticalpodautoscalercheckpoints/status
          namespaces: ["*"]
        - verbs: ["get", "list", "watch", "patch", "update"]
          apiGroups: [""]
          resources: ["pods"]
          namespaces: ["*"]
        - verbs: ["create"]
          apiGroups: [""]
          resources: ["pods/eviction", "events"]
          namespaces: ["*"]
        - verbs: ["get", "list", "watch", "patch", "update"]
          apiGroups: ["apps"]
          resources: ["deployments", "deployments/scale"]
          namespaces: ["*"]
---
apiVersion: flowcontrol.apiserver.k8s.io/v1
kind: FlowSchema
metadata:
  name: pp-vpa-node-agents
spec:
  matchingPrecedence: 850
  priorityLevelConfiguration:
    name: pp-vpa-node-agents
  distinguisherMethod:
    type: ByUser
  rules:
    - subjects:
        - kind: ServiceAccount
          serviceAccount:
            namespace: {{ .Values.namespace }}
            name: pp-vpa-node-agent
      resourceRules:
        - verbs: ["patch", "update"]
          apiGroups: [""]
          resources: ["pods/resize"]
          namespaces: ["*"]
        - verbs: ["patch", "update"]
          apiGroups: ["autoscaling.brycemclachlan.me"]
          resources: ["podresourcerecommendations/status"]
          namespaces: ["*"]
        - verbs: ["get", "list", "watch"]
          apiGroups: [""]
          resources: ["pods"]
          namespaces: ["*"]
        - verbs: ["get", "list", "watch"]
          apiGroups: ["autoscaling.brycemclachlan.me"]
          resources:
            - podresourcerecommendations
            - perpodverticalpodautoscalers
          namespaces: ["*"]
{{- end }}
